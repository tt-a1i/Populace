name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # a. Backend — ruff lint + pytest
  # ─────────────────────────────────────────────
  backend-test:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest

    env:
      # Stub values so settings validation doesn't block import
      NEO4J_URI: bolt://localhost:7687
      REDIS_URL: redis://localhost:6379
      LLM_API_KEY: placeholder
      LLM_BASE_URL: ""
      LLM_MODEL_NAME: gpt-4o-mini

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install runtime dependencies
        run: pip install -r backend/requirements.txt

      - name: Install dev dependencies
        run: pip install ruff pytest pytest-asyncio httpx

      - name: Lint (ruff)
        run: ruff check .

      - name: Run pytest
        run: python -m pytest tests/ -v

  # ─────────────────────────────────────────────
  # b. Frontend — lint + build + vitest
  # ─────────────────────────────────────────────
  frontend-lint-build-test:
    name: Frontend (Node 22)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npx vitest run

  # ─────────────────────────────────────────────
  # c. Docker — validate compose config + builds
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose config
        run: docker compose --env-file .env.example config

      - name: Build backend image
        run: docker build -t populace-backend ./backend

      - name: Build frontend image
        run: docker build -t populace-frontend ./frontend

  # ─────────────────────────────────────────────
  # d. Deploy — push images to GHCR (main only)
  #    Runs only after all CI jobs pass on push to main
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy (GHCR)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-lint-build-test, docker-build]

    # Only deploy on direct push to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/populace-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/populace-frontend:latest
